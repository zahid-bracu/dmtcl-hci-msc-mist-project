<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MRT Vending Machine</title>
  <link rel="stylesheet" href="./style_amount.css">
  <style>
      /* Reset default margin and padding */
 
  </style>
</head>
<body>

  <!-- Progress Bar Section -->
  <div class="progress-container">
    <div class="progress-bar" id="progressBar">
      60%
    </div>
  </div>

  <!-- Header Section -->
  <div class="header">
    <!-- Logo on the left side -->
    <img src="./dmtcl.png" alt="DMTC Logo">
    <h3 id="headerText">Dhaka Mass Transit Company Limited (DMTCL)</h3>
    <div class="top-right">
      <button id="themeToggle" class="nav-btn">Dark</button>
      <button id="langToggle" class="nav-btn">বাংলা</button>
    </div>
  </div>

  <!-- Main Content Section -->
  <div class="main">
    <h1 style="color:#00674f;margin-top: 15px;">Top-up Service</h1>
    <h2 style="color:#1f1f1f;margin-top: 30px;">Please Select your Amount</h2>
    <div class="button-container-amount">
      <button class="btn-amount">Tk. 20</button>
      <button class="btn-amount">Tk. 50</button>
      <button class="btn-amount">Tk. 100</button>
      <button class="btn-amount">Tk. 150</button>
      <button class="btn-amount">Tk. 200</button>
      <button class="btn-amount">Tk. 250</button>
      <button class="btn-amount">Tk. 300</button>
      <button class="btn-amount">Tk. 400</button>
      <button class="btn-amount">Tk. 500</button>
      <button class="btn-amount">Tk. 700</button>
      <button class="btn-amount">Tk. 1000</button>
      <button class="btn-amount">Tk. 1500</button>
      <button class="btn-amount">Tk. 3000</button>
      <button class="btn-amount">Tk. 5000</button>
      <button class="btn-amount">Tk. 6000</button>
      <button class="btn-amount">Tk. 7000</button>
      <button class="btn-amount">Tk. 8000</button>
      <button class="btn-amount">Tk. 9000</button>
    </div>
    <div>

    </div>

    <div class="btn-container">
        <button class="confirm-btn" id="confirmBtn">Confirm</button>
        <button class="clear-btn" id="clearBtn">Clear Selection</button>
      </div>
     <!-- Added Clear Button -->




       <!-- arrow -->
  <div class="button-container-arrow">
    <!-- Back Button -->
    <button class="btn-arrow btn-back" onclick="goBack()">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" width="20" height="20">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
      </svg>
      Back
    </button>

    <!-- Next Button -->
    <button class="btn-arrow btn-next" onclick="goNext()">
      Next
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" width="20" height="20">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
      </svg>
    </button>
  </div>
  </div>



  <!-- Modal Section -->
  <div id="amountModal" class="modal">
    <div class="modal-content">
      <h2>Please select an amount before proceeding.</h2>
      <button class="close-btn" id="closeModalBtn">Close</button>
    </div>
  </div>

  <!-- Footer Section -->
  <div class="footer">
    <p id="footerText">Contact: 123-456-7890 | Email: support@metro.com</p>
  </div>

  <script>
    // Theme Toggle Logic
    const themeToggle = document.getElementById('themeToggle');
    themeToggle.addEventListener('click', () => {
      document.body.classList.toggle('dark-theme');
    });

    // Language Toggle Logic
    const langToggle = document.getElementById('langToggle');
    const headerText = document.getElementById('headerText');
    const footerText = document.getElementById('footerText');
    langToggle.addEventListener('click', () => {
      if (langToggle.innerText === 'বাংলা') {
        headerText.innerText = 'ঢাকা ম্যাস ট্রানজিট কোম্পানি লিমিটেড (ডিএমটিসিএল)';
        footerText.innerText = 'যোগাযোগ: ১২৩-৪৫৬-৭৮৯০ | ইমেইল: support@metro.com';
        langToggle.innerText = 'English';
      } else {
        headerText.innerText = 'Dhaka Mass Transit Company Limited (DMTCL)';
        footerText.innerText = 'Contact: 123-456-7890 | Email: support@metro.com';
        langToggle.innerText = 'বাংলা';
      }
    });

    // Logic for changing button color when clicked
    let selectedAmount = null;
    const amountButtons = document.querySelectorAll('.btn-amount');
    
    amountButtons.forEach(button => {
      button.addEventListener('click', function() {
        // Remove active class from all buttons
        amountButtons.forEach(btn => btn.classList.remove('active'));
        
        // Add active class to the clicked button
        this.classList.add('active');
        
        // Set selected amount
        selectedAmount = this.innerText;
      });
    });

    // Confirm button logic
    const confirmBtn = document.getElementById('confirmBtn');
    const clearBtn = document.getElementById('clearBtn'); // Clear button element
    const amountModal = document.getElementById('amountModal');
    const closeModalBtn = document.getElementById('closeModalBtn');

    confirmBtn.addEventListener('click', () => {
      if (!selectedAmount) {
        // If no amount is selected, show modal
        amountModal.style.display = 'flex';
      } else {
        window.location.href = "./payment_card.html";
        // You can add further logic to proceed with the selected amount
      }
    });

    // Clear button logic
    clearBtn.addEventListener('click', () => {
      // Remove active class from all buttons
      amountButtons.forEach(btn => btn.classList.remove('active'));
      selectedAmount = null; // Reset selected amount
    });

    // Close the modal when the close button is clicked
    closeModalBtn.addEventListener('click', () => {
      amountModal.style.display = 'none';
    });



    function goBack() {
      window.history.back(); // Go to the previous page
    }

    function goNext() {
      window.location.href = './payment_card.html'; // Go to the next page (adjust the URL)
    }
  </script>

</body>
</html>
