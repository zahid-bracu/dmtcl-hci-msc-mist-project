<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MRT Vending Machine</title>
  <link rel="stylesheet" href="./completed.css">
</head>
<body>

  <!-- Progress Bar Section -->
  <div class="progress-container">
    <div class="progress-bar" id="progressBar">
      100%
    </div>
  </div>

  <!-- Header Section -->
  <div class="header">
    <!-- Logo on the left side -->
    <img src="./dmtcl.png" alt="DMTCL Logo">
    <h3 id="headerText">Dhaka Mass Transit Company Limited (DMTCL)</h3>
    <div class="top-right">
      <button id="themeToggle" class="nav-btn">Dark</button>
      <button id="langToggle" class="nav-btn">বাংলা</button>
    </div>
  </div>

  <!-- Main Content Section -->
  <div class="main">
    <div class="message-container" style="text-align: center; margin-top: 00px;">
      
      <h1 style="color: #00674f; font-size: 32px;">Payment Complete</h1>
      <p style="font-size: 24px;margin-top: 15px;">Please collect your MRT card</p>
      <a href="./index.html">
        <button class="btn ">Home</button>
      </a>
    </div>
  </div>

  <!-- Footer Section -->
  <div class="footer">
    <p id="footerText">Contact: 123-456-7890 | Email: support@metro.com</p>
  </div>

  <script>
    // Theme Toggle Logic
    const themeToggle = document.getElementById('themeToggle');
    themeToggle.addEventListener('click', () => {
      document.body.classList.toggle('dark-theme');
    });

    // Language Toggle Logic (Simple Toggle between Bangla and English)
    const langToggle = document.getElementById('langToggle');
    const headerText = document.getElementById('headerText');
    const footerText = document.getElementById('footerText');
    langToggle.addEventListener('click', () => {
      const buttons = document.querySelectorAll('.btn');
      if (langToggle.innerText === 'বাংলা') {
 
        headerText.innerText = 'ঢাকা ম্যাস ট্রানজিট কোম্পানি লিমিটেড (ডিএমটিসিএল)';
        footerText.innerText = 'যোগাযোগ: ১২৩-৪৫৬-৭৮৯০ | ইমেইল: support@metro.com';
        langToggle.innerText = 'English';
      } else {
 
        headerText.innerText = 'Dhaka Mass Transit Company Limited (DMTCL)';
        footerText.innerText = 'Contact: 123-456-7890 | Email: support@metro.com';
        langToggle.innerText = 'বাংলা';
      }
    });
  </script>
</body>
</html>
